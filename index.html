<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Browser-based C code IDE powered by Wasmer SDK — write, compile, and run C programs entirely in your browser.">
  <title>CForge — Browser C IDE</title>

  <!-- Google Fonts (Local) -->
  <link rel="stylesheet" href="fonts/fonts.css">



  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-content">
      <div class="loader-ring">
        <div class="ring-segment"></div>
        <div class="ring-segment"></div>
        <div class="ring-segment"></div>
      </div>
      <h2 class="loader-title">CForge</h2>
      <p class="loader-status" id="loader-status">Initializing Wasmer SDK…</p>
    </div>
  </div>

  <!-- Main App Shell -->
  <div id="app" class="app hidden">

    <!-- Title Bar -->
    <header id="titlebar" class="titlebar">
      <div class="titlebar-left">
        <div class="titlebar-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6C5CE7" />
                <stop offset="100%" style="stop-color:#00CEC9" />
              </linearGradient>
            </defs>
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
          <span class="logo-text">CForge</span>
        </div>
      </div>
      <div class="titlebar-center">
        <span class="titlebar-filename" id="titlebar-filename">main.c</span>
      </div>
      <div class="titlebar-right">
        <div class="sdk-badge" id="sdk-badge">
          <span class="badge-dot"></span>
          <span>Wasmer SDK</span>
        </div>
      </div>
    </header>

    <!-- Toolbar -->
    <nav id="toolbar" class="toolbar">
      <div class="toolbar-group">
        <button id="btn-new" class="toolbar-btn" title="New File">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
          <span>New</span>
        </button>
        <div class="toolbar-divider"></div>
        <button id="btn-compile" class="toolbar-btn btn-primary" title="Compile (Ctrl+B)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <span>Compile</span>
        </button>
        <button id="btn-run" class="toolbar-btn btn-success" title="Compile & Run (Ctrl+Enter)" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <span>Run</span>
        </button>
        <button id="btn-compile-run" class="toolbar-btn btn-accent" title="Compile & Run (Ctrl+Shift+Enter)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="10 8 16 12 10 16 10 8"></polygon>
          </svg>
          <span>Compile &amp; Run</span>
        </button>
        <div class="toolbar-divider"></div>
        <div class="toolbar-select-wrapper">
          <select id="select-language" class="toolbar-select" title="Select Language">
            <option value="c" selected>C (ISO C17)</option>
            <option value="cpp">C++ (ISO C++17)</option>
          </select>
        </div>
      </div>
      <div class="toolbar-group">
        <button id="btn-examples" class="toolbar-btn" title="Load Example">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
          <span>Examples</span>
        </button>
        <div class="toolbar-divider"></div>
        <button id="btn-clear-console" class="toolbar-btn" title="Clear Console">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          <span>Clear</span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content">

      <!-- Editor Panel -->
      <section id="editor-panel" class="panel editor-panel">
        <div class="panel-header">
          <div class="panel-tab active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            <span id="editor-tab-name">main.c</span>
            <span class="unsaved-dot" id="unsaved-dot" style="display:none;"></span>
          </div>
        </div>
        <div id="editor-container" class="editor-container"></div>
      </section>

      <!-- Resize Handle -->
      <div id="resize-handle" class="resize-handle">
        <div class="resize-grip"></div>
      </div>

      <!-- Output Panel -->
      <section id="output-panel" class="panel output-panel">
        <div class="panel-header">
          <div class="output-tabs">
            <button class="panel-tab active" data-tab="console" id="tab-console">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
              </svg>
              <span>Console</span>
            </button>
            <button class="panel-tab" data-tab="output" id="tab-output">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
              <span>Program Output</span>
            </button>
            <button class="panel-tab" data-tab="algorithm" id="tab-algorithm">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
              <span>Algorithm</span>
            </button>
            <button class="panel-tab" data-tab="flowchart" id="tab-flowchart">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9" rx="1"></rect>
                <rect x="14" y="12" width="7" height="9" rx="1"></rect>
                <path d="M10 7.5h4v9"></path>
                <polygon points="12 16.5 14 16.5 14 14.5"></polygon>
              </svg>
              <span>Flowchart</span>
            </button>
          </div>
        </div>
        <div id="console-output" class="output-content active"></div>
        <div id="program-output" class="output-content"></div>
        <div id="algorithm-output" class="output-content algorithm-container">
          <div class="tab-placeholder">Compile your code to generate a step-by-step algorithm.</div>
        </div>
        <div id="flowchart-output" class="output-content flowchart-container">
          <div class="tab-placeholder">Compile your code to render a control flow diagram.</div>
        </div>
      </section>
    </main>

    <!-- Status Bar -->
    <footer id="statusbar" class="statusbar">
      <div class="statusbar-left">
        <span class="status-item" id="status-state">
          <span class="status-icon idle"></span>
          Ready
        </span>
        <span class="status-item" id="status-cursor">Ln 1, Col 1</span>
      </div>
      <div class="statusbar-right">
        <span class="status-item">C (ISO C17)</span>
        <span class="status-item">UTF-8</span>
        <span class="status-item" id="status-wasm-size" style="display:none;">WASM: -- bytes</span>
      </div>
    </footer>
  </div>

  <!-- Examples Modal -->
  <div id="examples-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Code Examples</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="examples-list"></div>
    </div>
  </div>

  <!-- Monaco Editor Loader (Local) -->
  <script src="node_modules/monaco-editor/min/vs/loader.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
